<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f39c12">
  <title>RSS Bağlantıları</title>
  <link href="https://fonts.bunny.net/css?family=inter:500,600,700,800" rel="stylesheet">
  <meta name="description" content="Türkçe içerik üreten sitelerin RSS bağlantılarını kategoriler altında listeler ve bu adresler arasında arama yapma imkanı sağlar.">
  <meta property="og:title" content="RSS Bağlantıları">
  <meta property="og:description" content="Türkçe içerik üreten sitelerin RSS bağlantılarını kategoriler altında listeler ve bu adresler arasında arama yapma imkanı sağlar.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bakinazik.github.io/rss/">
  <meta name="keywords" content="rss, türkçe rss, rss bağlantıları, turkish rss sources">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="16x16" href="dist/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="dist/favicon-32x32.png">
  <link rel="icon" type="image/x-icon" href="dist/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="dist/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="dist/android-chrome-512x512.png">
  <link rel="apple-touch-icon" href="dist/apple-touch-icon.png">
  <link rel="manifest" href="dist/site.webmanifest">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RSS Bağlantıları",
      "url": "https://bakinazik.github.io/rss/",
      "description": "Türkçe içerik üreten sitelerin RSS bağlantılarını kategoriler altında listeler ve bu adresler arasında arama yapma imkanı sağlar.",
      "inLanguage": "tr",
      "isPartOf": {
        "@type": "WebSite",
        "name": "Github: RSS Bağlantıları",
        "url": "https://github.com/bakinazik/rss"
      }
    }
  </script>
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
      const isLight = stored === 'light' || (stored === null && !prefersDark.matches);
      if (isLight) document.documentElement.classList.add('light-theme');
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="header-inner">
     <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/><path d="M4 4a16 16 0 0 1 16 16"/><path d="M4 11a9 9 0 0 1 9 9"/></svg>
        </div>
        <h1>RSS<span>Bağlantıları</span></h1>
      </div>
      <div class="header-actions">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"/><path d="M21 21l-6 -6"/></svg>
          <input type="text" id="searchInput" placeholder="Ne arıyorsun?" autocomplete="off">
          <button id="searchClearBtn" class="search-clear" aria-label="Temizle"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-x"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M18 6l-12 12" /><path d="M6 6l12 12" /></svg></button>
          <span class="shortcut">CTRL+K</span>
        </div>
        <div class="theme-switch-wrapper">
          <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox">
            <div class="slider">
              <svg class="icon sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/><path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"/></svg>
              <svg class="icon moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/></svg>
            </div>
          </label>
        </div>
      </div>
      </div>
   <div class="chips-container" id="chipsContainer">
      <div class="chips-scroll" id="chipsScroll"></div>
    </div>
    <div class="action-bar">
      <button id="selectAllBtn" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3.5 5.5l1.5 1.5l2.5 -2.5"/><path d="M3.5 11.5l1.5 1.5l2.5 -2.5"/><path d="M3.5 17.5l1.5 1.5l2.5 -2.5"/><path d="M11 6l9 0"/><path d="M11 12l9 0"/><path d="M11 18l9 0"/></svg>
        <span>Tümünü Seç</span>
      </button>
      <button id="clearSelectionBtn" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-14z"/><path d="M9 9l6 6m0 -6l-6 6"/></svg>
        <span>Temizle</span>
      </button>
      <button id="exportBtn" class="action-btn primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"/><path d="M12 17v-6"/><path d="M9.5 14.5l2.5 2.5l2.5 -2.5"/></svg>
        <span>OPML</span>
      </button>
      <div id="selectedCount" class="selected-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3l8 -8"/><path d="M20 12v6a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12a2 2 0 0 1 2 -2h9"/></svg>
        <span>0</span>
      </div>
    </div>
    </header>

    <main class="main-content">
      <div id="output" class="content-area">
        <div class="loading-state">
          <div class="loader"></div>
          <p>Yükleniyor...</p>
        </div>
      </div>
      <div id="scrollSentinel" style="height: 20px; width: 100%;"></div>
    </main>

    <footer class="app-footer">
      <div class="footer-links">
        <a href="https://github.com/bakinazik/rss/issues/new" target="_blank" class="footer-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5a5 5 0 0 1 7 0a5 5 0 0 0 7 0v9a5 5 0 0 1 -7 0a5 5 0 0 0 -7 0v-9z"/><path d="M5 21v-7"/></svg>
          Sorun Bildir
        </a>
        <a href="https://github.com/bakinazik/rss" target="_blank" class="footer-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5"/></svg>
          GitHub
        </a>
      </div>
      <div class="footer-stats">
        <span id="totalCount">0</span> RSS kaynağı
      </div>
    </footer>
  </div>
  <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Yukarı çık" title="Yukarı çık">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
  </button>
  <script src="script.js"></script>
</body>
</html>
